services:
  app_proxy:
    environment:
      APP_HOST: fatik-local-html-viewer_server_1
      APP_PORT: 3000
    depends_on:
      - server

  server:
    image: fatalre/fatik-local-html-viewer:2.0.3
    restart: unless-stopped
    environment:
      PORT: 3000
      DATA_DIR: /data
    volumes:
      - ${APP_DATA_DIR}/data:/data
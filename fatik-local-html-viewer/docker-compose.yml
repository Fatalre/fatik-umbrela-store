services:
  app_proxy:
    environment:
      APP_HOST: fatik-local-html-viewer_server_1
      APP_PORT: 3000
    depends_on:
      - server

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3000
      DATA_DIR: /data
    volumes:
      - ${APP_DATA_DIR}/data:/data
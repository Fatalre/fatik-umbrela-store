manifestVersion: 1
id: fatik-video-library
name: Video Library
tagline: Folder-based video library for Umbrel
category: media
version: "0.2.1"

port: 3000
icon: https://imgpx.com/VipaEh1CFabS.webp

description: >-
  A modern folder-based video library for Umbrel with real folder tree navigation,
  clean browsing for movies and series, poster generation, online playback,
  continue watching, resume from last position, watched tracking, external subtitles,
  series-aware episode views, and human-friendly quality selection for both original
  and streaming-ready playback.
  For upload go to app folder from home -> fatik-video-library -> data -> library.
  Then you can create folder and upload video. Then press Rescan in application

developer: Fatalre
website: https://bitstudio.com.ua
repo: https://github.com/Fatalre/fatik-umbrela-store
support: https://bitstudio.com.ua


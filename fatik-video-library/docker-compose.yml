version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: fatik-video-library_server_1
      APP_PORT: 3000
    depends_on:
      - server

  server:
    image: fatalre/fatik-video-library:0.1.0
    restart: unless-stopped
    environment:
      PORT: 3000
      NODE_ENV: production
      DATA_DIR: /data
      LIBRARY_DIR: /data/library
      CACHE_DIR: /data/cache
      CONFIG_DIR: /data/config
    volumes:
      - ${APP_DATA_DIR}/data:/data
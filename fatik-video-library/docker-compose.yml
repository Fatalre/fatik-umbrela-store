services:
  app_proxy:
    environment:
      APP_HOST: fatik-video-library_server_1
      APP_PORT: 3000

  server:
    image: fatalre/fatik-video-library:0.3.1
    restart: unless-stopped
    stop_grace_period: 1m

    environment:
      PORT: 3000
      NODE_ENV: production

      DATA_DIR: /data
      LIBRARY_DIR: /data/library
      CACHE_DIR: /data/cache
      CONFIG_DIR: /data/config

    volumes:
      - ${APP_DATA_DIR}/data:/data
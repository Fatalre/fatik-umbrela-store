manifestVersion: 1
id: fatik-adminer
name: Adminer
category: developer
version: "1.0.4"
tagline: Lightweight web database manager
description: >-
  Adminer + MariaDB in a single Umbrel application.
  When installed, it creates the main database and the root user with the password admin.
  Data is stored in app-data and persists across reboots.
  ISSUE: Sometimes it reports an incorrect password (loses the connection).
  Just enter the password 2–3 times and it will let you through.

developer: Fatalre
website: https://bitstudio.com.ua
repo: https://github.com/vrana/adminer
support: https://bitstudio.com.ua

port: 8082
icon: https://imgpx.com/ZpVD5DwHEVaW.webp

gallery:
  - 1.jpg
  - 2.jpg
releaseNotes: ""
dependencies: []
path: ""
defaultUsername: "root"
defaultPassword: "admin"
submitter: Fatalre
submission: https://github.com/Fatalre/fatik-umbrela-store.git